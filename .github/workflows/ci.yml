name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: pytest -q

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: junimo-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test container
        run: |
          mkdir -p saves/Test_123456
          python - <<'PY'
          from pathlib import Path
          xml = (
              '<?xml version="1.0" encoding="utf-8"?>\n'
              '<SaveGame xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">'
              '<player>'
              '<name>CI</name>'
              '<UniqueMultiplayerID>1</UniqueMultiplayerID>'
              '<farmName>CI Farm</farmName>'
              '<isMale>true</isMale>'
              '<catPerson>true</catPerson>'
              '<money>1000</money>'
              '<dayOfMonthForSaveGame>3</dayOfMonthForSaveGame>'
              '<seasonForSaveGame>1</seasonForSaveGame>'
              '<yearForSaveGame>2</yearForSaveGame>'
              '<houseUpgradeLevel>1</houseUpgradeLevel>'
              '<stats><DaysPlayed>59</DaysPlayed></stats>'
              '<professions><int>0</int></professions>'
              '<friendshipData/>'
              '<mailReceived/>'
              '</player>'
              '<farmerFriendships/>'
              '<locations>'
              '<GameLocation xsi:type="Farm">'
              '<buildings/><terrainFeatures/><largeTerrainFeatures/>'
              '<resourceClumps/><objects/><characters/>'
              '</GameLocation>'
              '</locations>'
              '<currentSeason>summer</currentSeason>'
              '<uniqueIDForThisGame>123456</uniqueIDForThisGame>'
              '<hasApplied1_3_UpdateChanges>true</hasApplied1_3_UpdateChanges>'
              '<whichFarm>0</whichFarm>'
              '</SaveGame>\n'
          )
          Path('saves/Test_123456/Test_123456').write_text(xml, encoding='utf-8')
          PY

          docker run -d --name junimo-ci \
            -p 8000:8000 \
            -v "$PWD/saves:/saves:ro" \
            junimo-api:ci

          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/healthz >/dev/null; then
              echo "ready after ${i}s"
              break
            fi
            sleep 1
          done

          curl -fsS http://localhost:8000/healthz
          curl -fsS http://localhost:8000/saves | tee /tmp/saves.json
          grep -q "Test_123456" /tmp/saves.json
          curl -fsS http://localhost:8000/saves/Test_123456 | tee /tmp/save.json
          grep -q '"name": "CI"' /tmp/save.json
          curl -fsS http://localhost:8000/saves/Test_123456/farm | tee /tmp/farm.json
          grep -q '"mapType"' /tmp/farm.json
          curl -fsS http://localhost:8000/saves/Test_123456/full | tee /tmp/full.json
          grep -q '"summary"' /tmp/full.json
          grep -q '"farm"' /tmp/full.json
          curl -fsS -X POST http://localhost:8000/saves/Test_123456/refresh >/dev/null
          curl -fsS -X POST http://localhost:8000/refresh >/dev/null

      - name: Container logs on failure
        if: failure()
        run: docker logs junimo-ci || true
